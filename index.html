<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Reimbursement</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>Expense Reimbursement</h1>
        <p class="subtitle">Submit expenses for approval and track their status.</p>
      </header>

      <section class="card">
        <h2>New Expense</h2>
        <form id="expense-form" novalidate>
          <div class="form-grid">
            <div class="form-field">
              <label for="name">Expense Name</label>
              <input type="text" id="name" name="name" placeholder="e.g. Client dinner" required />
            </div>

            <div class="form-field">
              <label for="category">Category</label>
              <select id="category" name="category" required>
                <option value="" disabled selected>Select a category</option>
                <option value="Travel">Travel</option>
                <option value="Meals">Meals</option>
                <option value="Software">Software</option>
                <option value="Office Supplies">Office Supplies</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-field">
              <label for="amount">Amount (USD)</label>
              <input
                type="number"
                id="amount"
                name="amount"
                min="0"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>

            <div class="form-field">
              <label for="date">Date</label>
              <input type="date" id="date" name="date" required />
            </div>

            <div class="form-field form-field--full">
              <label for="description">Description <span class="optional">(optional)</span></label>
              <textarea
                id="description"
                name="description"
                rows="2"
                placeholder="Add any relevant notes..."
              ></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button type="reset" class="btn btn--secondary">Clear</button>
            <button type="submit" class="btn btn--primary">Submit Expense</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Submitted Expenses</h2>
          <div class="total">
            <span class="total-label">Total</span>
            <span class="total-amount" id="total-amount">$0.00</span>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="expense-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Category</th>
                <th class="align-right">Amount</th>
                <th>Date</th>
                <th>Description</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="expense-tbody">
              <tr class="empty-row" id="empty-row">
                <td colspan="6">No expenses submitted yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
